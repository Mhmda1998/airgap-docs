name: Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  gh-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"

      - name: Build and Deploy
        run: |
          npm ci
          npm run build
          # تأكد أن مجلد البناء هو 'build' بناءً على ملفك القديم
          cd build
          git config --global user.email "support+actions@github.com"
          git config --global user.name "github-actions-bot"
          git init
          git add -A
          git commit -m 'chore(docs): auto-deploy'
          git push -f https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:gh-pages
